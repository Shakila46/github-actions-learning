name: Artifact Workflow Test

on:
  push:
    branches:
      - advanced-tasks

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Create a secret text file
        run: echo "This is a highly classified document for Task 8!" > secret-report.txt
        
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-special-artifact
          path: secret-report.txt

  download-and-read:
    needs: create-and-upload
    runs-on: ubuntu-latest
    steps:
      
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: my-special-artifact
          
      - name: Read the downloaded file
        run: cat secret-report.txt